<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渡幕(Trans-Jimaku) - 下载中心</title>
    <style>
        :root {
            /* === 配色调整核心区域 === */
            /* 原色 #4a90e2 调整为更柔和的静谧蓝/雾霾蓝，与粉色更搭 */
            --primary-color: #6B8CC5; 
            --primary-hover: #5A76A8;
            
            /* 樱花粉保持，但增加一点暖色倾向的渐变色 */
            --accent-color: #FFB7C5; 
            --accent-gradient-end: #FFD1DC;
            
            /* 背景调整为更标准的爱丽丝蓝 */
            --bg-color: #F0F8FF;
            
            /* 文字颜色不再是纯黑，而是深蓝灰，减少突兀感 */
            --text-primary: #4A5568;
            --text-secondary: #718096;
            
            /* 卡片背景更透亮 */
            --card-glass: rgba(255, 255, 255, 0.75);
            --card-border: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            /* 兜底背景改为柔和的爱丽丝蓝渐变 */
            background: linear-gradient(120deg, #fdfbfb 0%, #ebedee 100%); 
            color: var(--text-primary);
            display: flex;
            justify-content: flex-start; /* 改回偏左 */
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 0 60px; /* 只保留左右 padding，让垂直方向完全居中 */
            position: relative;
            overflow: hidden; /* 修复滚动条问题 */
        }
        
        /* 如果有背景图，这里依然生效，但叠加了一层白色遮罩让图片不抢眼 */
        body::after {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('bg_common.png') repeat;
            opacity: 0.6;
            z-index: -2;
            pointer-events: none;
        }
        
        /* pickup_bg.png 顶层背景 - 拍照闪光效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('pickup_bg.png') center/cover no-repeat fixed;
            z-index: -1;
            pointer-events: none;
            animation: photoFlashRotate 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* 拍照闪光+旋转动画 - 柔化版本 */
        @keyframes photoFlashRotate {
            0% {
                opacity: 0;
                transform: scale(1.4) rotate(-8deg);
                filter: blur(30px) brightness(2);
            }
            15% {
                opacity: 1;
                filter: brightness(2.5) blur(15px);
            }
            40% {
                opacity: 1;
                transform: scale(1.1) rotate(2deg);
                filter: brightness(1.2) blur(8px);
            }
            70% {
                transform: scale(0.98) rotate(-1deg);
                filter: brightness(1.05) blur(2px);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
                filter: brightness(1) blur(0);
            }
        }
        
        .container {
            /* 爱丽丝蓝玻璃质感 */
            background: rgba(240, 248, 255, 0.65);
            backdrop-filter: blur(15px) saturate(180%); /* 减少模糊 */
            -webkit-backdrop-filter: blur(15px) saturate(180%);
            width: 100%;
            max-width: 650px;
            padding: 40px 50px;
            border-radius: 24px;
            margin-left: 200px;
            /* 阴影调整为淡蓝紫色，而非深黑 */
            box-shadow: 0 30px 60px rgba(107, 140, 197, 0.15),
                        0 0 0 1px rgba(255, 255, 255, 0.9) inset,
                        0 2px 0 0 rgba(255, 255, 255, 0.6) inset; /* 顶部内发光 */
            text-align: center;
            position: relative;
            z-index: 10;
            animation: cardFocusIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 1.5s backwards;
            border: 1px solid rgba(135, 206, 250, 0.4); /* 改为天蓝色边框 */
            overflow: hidden;
        }
        
        /* 添加顶部高光效果 */
        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 50%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.4) 0%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 0;
        }
        
        /* 确保内容在高光层之上 */
        .container > * {
            position: relative;
            z-index: 1;
        }
        
        @keyframes cardFocusIn {
            0% {
                opacity: 0;
                transform: scale(0.9) translateY(30px);
                filter: blur(20px);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0);
            }
        }
        
        @media (max-width: 1024px) {
            .container {
                max-width: 500px;
                margin-left: 100px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 35px;
                border-radius: 24px;
                margin-left: 0;
                max-width: 90%;
            }
            body {
                justify-content: center;
                padding: 30px;
            }
        }
        
        h1 { 
            margin-bottom: 6px; 
            font-size: 32px; 
            font-weight: 800;
            letter-spacing: -0.5px;
            /* 标题渐变：从静谧蓝过渡到樱花粉 */
            background: linear-gradient(135deg, var(--primary-color) 10%, #FF9DB3 90%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 2px 4px rgba(107, 140, 197, 0.1));
        }
        
        .subtitle { 
            color: var(--text-secondary); 
            margin-bottom: 35px; 
            font-size: 14px;
            font-weight: 500;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }
        
        /* 核心下载卡片 - 淡爱丽丝蓝微透 */
        .card {
            background: rgba(230, 244, 255, 0.85); /* 加深淡爱丽丝蓝，提高不透明度 */
            backdrop-filter: blur(8px); /* 减少模糊 */
            border-radius: 20px;
            padding: 24px;
            text-align: left;
            position: relative;
            box-shadow: 0 10px 30px rgba(107, 140, 197, 0.08),
                        0 1px 0 0 rgba(255, 255, 255, 0.8) inset; /* 顶部内发光 */
            transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
            animation: cardSlideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.7s backwards;
            border: 1px solid rgba(107, 140, 197, 0.3); /* 改为静谧蓝边框 */
            overflow: hidden;
        }
        
        /* 卡片顶部高光 - 减弱强度 */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 40%;
            background: linear-gradient(
                180deg,
                rgba(255, 255, 255, 0.15) 0%,
                transparent 100%
            );
            pointer-events: none;
            z-index: 0;
        }
        
        /* 确保内容在高光层之上 */
        .card > * {
            position: relative;
            z-index: 1;
        }
        
        @keyframes cardSlideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .card:hover { 
            transform: translateY(-5px); 
            background: rgba(240, 248, 255, 0.75); /* 淡爱丽丝蓝 */
            box-shadow: 0 15px 35px rgba(107, 140, 197, 0.15);
        }
        
        .tag {
            background: linear-gradient(135deg, #FFB7C5, #FFC9D6);
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 700;
            position: absolute;
            top: 24px;
            right: 24px;
            box-shadow: 0 4px 10px rgba(255, 183, 197, 0.4);
            letter-spacing: 0.5px;
            z-index: 2;
        }
        
        /* 标签文字渐变 - 深静谧蓝到深紫蓝 */
        .tag span {
            background: linear-gradient(135deg, #5A76A8 0%, #4A5F8C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
        }

        .version-info { margin-bottom: 20px; }
        .version-title { 
            font-weight: 800; 
            font-size: 24px; 
            margin-bottom: 4px; 
            display: block; 
            color: var(--text-primary);
        }
        .version-date { 
            color: #9AA5B1; /* 更浅的灰色 */
            font-size: 12px; 
            display: block;
            font-weight: 500;
        }
        
        .password-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .pass-item {
            /* 密码框改为淡爱丽丝蓝底色 */
            background: rgba(240, 248, 255, 0.6);
            border-radius: 14px;
            padding: 12px 16px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            border: 2px solid rgba(107, 140, 197, 0.25); /* 增强边框可见度 */
            box-shadow: 0 2px 6px rgba(107, 140, 197, 0.05);
        }
        
        .pass-item:hover {
            border-color: rgba(107, 140, 197, 0.4);
            background: rgba(240, 248, 255, 0.85); /* 悬浮时更明显的淡爱丽丝蓝 */
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(107, 140, 197, 0.1);
        }
        
        .pass-item:active {
            transform: scale(0.98);
        }
        
        .pass-label {
            display: block;
            font-size: 10px;
            color: #A0AEC0;
            margin-bottom: 8px; /* 增加间距 */
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .pass-value-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .pass-code {
            /* 优雅的日系字体，支持日文 */
            font-family: 'Yu Gothic', 'YuGothic', 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', 'Meiryo', 'MS PGothic', sans-serif;
            font-weight: 600; /* 加粗 */
            color: var(--text-primary);
            font-size: 16px;
            letter-spacing: 0.5px;
        }
        
        .copy-icon {
            width: 18px;
            height: 18px;
            fill: #CBD5E0;
            transition: fill 0.3s;
        }
        
        .pass-item:hover .copy-icon { fill: var(--primary-color); }
        
        .pass-item.copied {
            background: #FFF5F7; /* 极淡的粉色背景 */
            border-color: #FFB7C5;
        }
        .pass-item.copied .pass-code { color: #E68FAC; }
        .pass-item.copied .copy-icon { fill: #FFB7C5; }

        .tooltip {
            position: absolute;
            top: -34px;
            left: 50%;
            transform: translateX(-50%) scale(0.8);
            background: var(--text-primary);
            color: white;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 11px;
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .pass-item.copied .tooltip {
            opacity: 1;
            transform: translateX(-50%) scale(1);
            top: -40px;
        }
        /* 小三角 */
        .tooltip::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 50%;
            margin-left: -4px;
            border-width: 4px;
            border-style: solid;
            border-color: var(--text-primary) transparent transparent transparent;
        }

        /* 按钮重绘 - 增加光泽感 */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 16px 0;
            /* 更柔和的樱花渐变 */
            background: linear-gradient(90deg, #FFB7C5 0%, #FFC9D6 100%);
            color: #fff;
            text-decoration: none;
            border-radius: 16px;
            font-weight: 700;
            font-size: 16px;
            box-shadow: 0 8px 20px rgba(255, 183, 197, 0.4);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            border: 2px solid rgba(255, 183, 197, 0.6); /* 增强边框 */
        }
        
        /* 按钮文字渐变效果 - 深静谧蓝到深紫蓝 */
        .btn span {
            background: linear-gradient(135deg, #5A76A8 0%, #4A5F8C 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 700;
            position: relative;
            z-index: 2;
        }
        
        /* 按钮内部的高光效果 */
        .btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(255,255,255,0.2), transparent);
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .btn:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 12px 25px rgba(255, 183, 197, 0.5);
            background: linear-gradient(90deg, #FF9EBC 0%, #FFB7C5 100%);
            border-color: rgba(255, 183, 197, 0.8);
        }
        .btn:hover::after { opacity: 1; }
        .btn:active { transform: scale(0.98); }

        /* 历史版本 */
        .history-section {
            margin-top: 35px;
            padding-top: 20px;
            border-top: 1px solid rgba(107, 140, 197, 0.1); /* 极淡的蓝色分割线 */
            animation: fadeIn 0.8s ease-out 2.3s backwards;
        }
        
        .history-list {
            max-height: 180px;
            overflow-y: auto;
            margin-top: 15px;
            padding-right: 5px;
        }
        
        /* 滚动条更细更淡 */
        .history-list::-webkit-scrollbar { width: 4px; }
        .history-list::-webkit-scrollbar-track { background: transparent; }
        .history-list::-webkit-scrollbar-thumb {
            background: rgba(107, 140, 197, 0.2);
            border-radius: 4px;
        }
        .history-list::-webkit-scrollbar-thumb:hover { background: rgba(107, 140, 197, 0.4); }

        .history-title {
            font-size: 11px; 
            color: #9AA5B1; 
            text-align: left;
            font-weight: 700;
            letter-spacing: 1.2px;
            margin-left: 5px;
        }
        
        .history-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.4); /* 更透 */
            border-radius: 12px;
            transition: all 0.2s;
            margin-bottom: 8px;
            border: 1px solid rgba(107, 140, 197, 0.2); /* 增强边框 */
        }
        
        .history-link:hover { 
            color: var(--primary-color);
            background: #fff;
            border-color: rgba(107, 140, 197, 0.35);
            transform: translateX(2px);
            box-shadow: 0 4px 12px rgba(107, 140, 197, 0.08);
        }
        
        .footer { 
            margin-top: 40px; 
            font-size: 12px; 
            color: #A0AEC0;
            animation: fadeIn 0.8s ease-out 2.5s backwards;
        }
        .footer a { 
            color: #718096;
            text-decoration: none; 
            margin: 0 10px; 
            transition: color 0.2s;
            font-weight: 600;
        }
        .footer a:hover { color: var(--primary-color); }
        .copyright { margin-top: 8px; font-size: 11px; opacity: 0.7; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

    </style>
</head>
<body>

<div class="container">
    <h1>渡幕 (Trans-Jimaku)</h1>
    <div class="subtitle">同人音声沉浸式 AI 翻校工具</div>

    <div class="card">
        <span class="tag"><span>最新公测版</span></span>
        
        <div class="version-info">
            <span class="version-title">v1.2.5</span>
            <span class="version-date">更新于 2026-02-06</span>
        </div>

        <div class="password-grid">
            <div class="pass-item" onclick="copyToClipboard(this, '大家翻')">
                <div class="tooltip">已复制</div>
                <span class="pass-label">访问密码</span>
                <div class="pass-value-row">
                    <span class="pass-code">大家翻</span>
                    <svg class="copy-icon" viewBox="0 0 24 24">
                        <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/>
                    </svg>
                </div>
            </div>

            <div class="pass-item" onclick="copyToClipboard(this, '新妻ひより')">
                <div class="tooltip">已复制</div>
                <span class="pass-label">解压密码</span>
                <div class="pass-value-row">
                    <span class="pass-code">新妻ひより</span>
                    <svg class="copy-icon" viewBox="0 0 24 24">
                        <path d="M16 1H4C2.9 1 2 1.9 2 3V17H4V3H16V1ZM19 5H8C6.9 5 6 5.9 6 7V21C6 22.1 6.9 23 8 23H19C20.1 23 21 22.1 21 21V7C21 5.9 20.1 5 19 5ZM19 21H8V7H19V21Z"/>
                    </svg>
                </div>
            </div>
        </div>

        <a href="https://wwbed.lanzoul.com/b01884k1ed" class="btn" target="_blank">
            <svg style="width:20px;height:20px;margin-right:8px;position:relative;z-index:2;" viewBox="0 0 24 24">
                <defs>
                    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#5A76A8;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#4A5F8C;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <path fill="url(#iconGradient)" d="M19,9H15V3H9V9H5L12,16L19,9M5,18V20H19V18H5Z" />
            </svg>
            <span>立即下载 v1.2.5</span>
        </a>
    </div>

    <div class="history-section">
        <div class="history-title">历史版本 / BACKUP</div>
        
        <div class="history-list">
            <a href="https://wwbed.lanzoul.com/b01884b8tg" class="history-link" target="_blank">
                <span>v1.2.3 (Stable)</span>
                <svg style="width:16px;height:16px;fill:#cbd5e0;" viewBox="0 0 24 24"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" /></svg>
            </a>
            
            <a href="https://wwbed.lanzoul.com/b0188387xa" class="history-link" target="_blank">
                <span>v1.2.2</span>
                <svg style="width:16px;height:16px;fill:#cbd5e0;" viewBox="0 0 24 24"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z" /></svg>
            </a>
        </div>
    </div>

    <div class="footer">
        <a href="https://afdian.com/a/yuuriyakuki" target="_blank">⚡ 爱发电</a>
        <span style="color:#CBD5E0">|</span>
        <a href="https://space.bilibili.com/3546921813674876" target="_blank">📺 Bilibili</a>
        <span class="copyright">© 2026 幽离译归</span>
    </div>
</div>

<script>
    function copyToClipboard(element, text) {
        navigator.clipboard.writeText(text).then(() => {
            const originalIcon = element.querySelector('.copy-icon').innerHTML;
            const svgIcon = element.querySelector('.copy-icon');
            element.classList.add('copied');
            
            // 变成对钩
            svgIcon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';
            
            setTimeout(() => {
                element.classList.remove('copied');
                svgIcon.innerHTML = originalIcon;
            }, 2000);
        }).catch(err => {
            console.error('复制失败:', err);
        });
    }
</script>

</body>
</html>
