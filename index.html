<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>渡幕(Trans-Jimaku) - 下载中心</title>
    <style>
        :root {
            --primary-color: #4a90e2; 
            --primary-hover: #357abd;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --card-bg: #f8f9fa;
            --pass-bg: #eff2f5;
            --pass-hover: #e2e6ea;
        }
        body {
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: url('bg_common.png') repeat;
            color: var(--text-color);
            display: flex;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 60px;
            position: relative;
            overflow: hidden;
        }
        
        /* 顶层背景图片 - 拍照闪光+旋转效果 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('pickup_bg.png') center/cover no-repeat fixed;
            z-index: 1;
            pointer-events: none;
            animation: photoFlashRotate 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        /* 拍照闪光+旋转动画 */
        @keyframes photoFlashRotate {
            0% {
                opacity: 0;
                transform: scale(1.4) rotate(-8deg);
                filter: blur(30px) brightness(3);
            }
            15% {
                opacity: 1;
                filter: brightness(5) blur(15px);
            }
            40% {
                opacity: 1;
                transform: scale(1.1) rotate(2deg);
                filter: brightness(1.3) blur(8px);
            }
            70% {
                transform: scale(0.98) rotate(-1deg);
                filter: brightness(1.05) blur(2px);
            }
            100% {
                opacity: 1;
                transform: scale(1) rotate(0deg);
                filter: brightness(1) blur(0);
            }
        }
        .container {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            width: 100%;
            max-width: 650px;
            padding: 40px 50px;
            border-radius: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.18),
                        0 0 0 1px rgba(255, 255, 255, 0.9) inset;
            text-align: center;
            position: relative;
            z-index: 10;
            margin-left: 200px;
            animation: cardFocusIn 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) 1.5s backwards;
        }
        
        /* 卡片聚焦入场动画 - 模糊到清晰+弹性缩放 */
        @keyframes cardFocusIn {
            0% {
                opacity: 0;
                transform: scale(0.7) translateY(20px);
                filter: blur(25px) brightness(0.5);
            }
            50% {
                opacity: 0.8;
                transform: scale(1.05) translateY(-5px);
                filter: blur(5px) brightness(1.1);
            }
            75% {
                transform: scale(0.98) translateY(2px);
                filter: blur(1px) brightness(1.02);
            }
            100% {
                opacity: 1;
                transform: scale(1) translateY(0);
                filter: blur(0) brightness(1);
            }
        }
        
        /* 响应式调整 */
        @media (max-width: 1024px) {
            .container {
                max-width: 500px;
                margin-left: 100px;
            }
        }
        
        @media (max-width: 768px) {
            .container {
                max-width: 90%;
                padding: 35px;
                margin-left: 0;
            }
            body {
                justify-content: center;
                padding: 30px;
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px) scale(0.9);
                filter: blur(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
                filter: blur(0);
            }
        }
        h1 { 
            margin-bottom: 8px; 
            font-size: 30px; 
            font-weight: 700;
            letter-spacing: -0.8px;
            color: #1a202c;
        }
        .subtitle { 
            color: #718096; 
            margin-bottom: 32px; 
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.2px;
        }
        
        /* 核心下载卡片 */
        .card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(237, 242, 247, 0.8);
            border-radius: 16px;
            padding: 22px;
            text-align: left;
            position: relative;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            animation: cardSlideUp 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 1.7s backwards;
        }
        
        /* 内部卡片滑入动画 */
        @keyframes cardSlideUp {
            0% {
                opacity: 0;
                transform: translateY(30px) scale(0.95);
            }
            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        .card:hover { 
            transform: translateY(-4px); 
            box-shadow: 0 12px 32px rgba(74, 144, 226, 0.25),
                        0 0 0 1px rgba(74, 144, 226, 0.1) inset;
            border-color: rgba(74, 144, 226, 0.3);
        }
        
        /* 标签样式优化 */
        .tag {
            background: linear-gradient(135deg, #4a90e2, #6aa8f0);
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            position: absolute;
            top: 20px;
            right: 20px;
            box-shadow: 0 2px 8px rgba(74, 144, 226, 0.4);
            letter-spacing: 0.3px;
        }

        .version-info { margin-bottom: 18px; }
        .version-title { 
            font-weight: 800; 
            font-size: 22px; 
            margin-bottom: 4px; 
            display: block; 
            color: #1a202c;
            letter-spacing: -0.5px;
        }
        .version-date { 
            color: #a0aec0; 
            font-size: 12px; 
            display: block;
            font-weight: 400;
        }
        
        /* === 新版密码区域样式 === */
        .password-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }
        .pass-item {
            background-color: var(--pass-bg);
            border-radius: 10px;
            padding: 10px 12px;
            cursor: pointer;
            position: relative;
            transition: all 0.2s ease;
            border: 1px solid transparent;
            user-select: none; /* 防止双击选中文字，只允许点击复制 */
        }
        .pass-item:hover {
            background-color: var(--pass-hover);
            transform: translateY(-1px);
        }
        .pass-item:active {
            transform: translateY(1px) scale(0.98);
        }
        .pass-label {
            display: block;
            font-size: 11px;
            color: #a0aec0;
            margin-bottom: 4px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .pass-value-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .pass-code {
            font-family: 'SF Mono', 'Consolas', 'Monaco', 'Courier New', monospace;
            font-weight: 600;
            color: #2d3748;
            font-size: 15px;
            letter-spacing: 0.3px;
        }
        .copy-icon {
            width: 16px;
            height: 16px;
            fill: #a0aec0;
            transition: fill 0.2s;
        }
        .pass-item:hover .copy-icon { fill: var(--primary-color); }
        .pass-item.copied {
            background-color: #e6fffa;
            border-color: #38b2ac;
        }
        .pass-item.copied .pass-code { color: #2c7a7b; }
        .pass-item.copied .copy-icon { fill: #38b2ac; }

        /* 提示气泡 */
        .tooltip {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #333;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s, top 0.2s;
        }
        .pass-item.copied .tooltip {
            opacity: 1;
            top: -35px;
        }

        /* 按钮优化 */
        .btn {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            padding: 15px 0;
            background: var(--primary-color);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.3px;
            box-shadow: 0 4px 14px rgba(74, 144, 226, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .btn:hover { 
            background-color: var(--primary-hover); 
            box-shadow: 0 8px 24px rgba(74, 144, 226, 0.5);
            transform: translateY(-2px);
        }
        .btn:active { 
            transform: translateY(0); 
            box-shadow: 0 4px 14px rgba(74, 144, 226, 0.4);
        }

        /* 历史版本 */
        .history-section {
            margin-top: 25px;
            padding-top: 18px;
            border-top: 1px dashed rgba(226, 232, 240, 0.6);
            animation: fadeIn 0.6s ease-out 2.3s backwards;
        }
        
        /* 简单淡入动画 */
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        .history-title {
            font-size: 12px; 
            color: #a0aec0; 
            margin-bottom: 14px; 
            text-align: left;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .history-link {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            color: #4a5568;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(5px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            border-radius: 10px;
            transition: all 0.3s;
            margin-bottom: 10px;
        }
        .history-link:hover { 
            color: var(--primary-color); 
            border-color: var(--primary-color);
            background-color: rgba(248, 251, 255, 0.9);
            transform: translateX(4px);
        }
        
        .footer { 
            margin-top: 30px; 
            font-size: 11px; 
            color: #718096;
            line-height: 1.8;
            animation: fadeIn 0.6s ease-out 2.5s backwards;
        }
        .footer a { 
            color: #4a5568;
            text-decoration: none; 
            margin: 0 8px; 
            transition: all 0.3s;
            font-weight: 500;
        }
        .footer a:hover { 
            color: var(--primary-color);
            transform: translateY(-1px);
        }
        .copyright { 
            display: block; 
            margin-top: 8px;
            color: #a0aec0;
            font-size: 11px;
        }

    </style>
</head>
<body>

<script>
    function copyToClipboard(element, text) {
        // 使用现代 Clipboard API
        navigator.clipboard.writeText(text).then(() => {
            // 成功的 UI 反馈
            const originalIcon = element.querySelector('.copy-icon').innerHTML;
            const svgIcon = element.querySelector('.copy-icon');
            
            // 添加已复制样式类
            element.classList.add('copied');
            
            // 将图标更改为对钩
            svgIcon.innerHTML = '<path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/>';
            
            // 2秒后恢复原状
            setTimeout(() => {
                element.classList.remove('copied');
                svgIcon.innerHTML = originalIcon; // 恢复原来的复制图标
            }, 2000);
        }).catch(err => {
            console.error('复制失败:', err);
            alert('复制失败，请手动复制');
        });
    }
</script>
